<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Overlay — Editor</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: #0B0F12;
    color: #F3F6F8;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2B3238; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

// ─── Tokens ───────────────────────────────────────────────
const T = {
  appBg:           '#0B0F12',
  appChrome:       '#101418',
  panelBg:         '#15191D',
  panelHeader:     '#1B2025',
  surfaceControl:  '#20252A',
  surfaceHover:    '#272D33',
  surfacePressed:  '#11161A',
  surfaceSelected: '#263244',
  borderSubtle:    '#2B3238',
  borderStrong:    '#3A424A',
  textPrimary:     '#F3F6F8',
  textSecondary:   '#B6BEC7',
  textMuted:       '#7E8893',
  accentBlue:      '#2F8CFF',
  accentSoft:      '#123052',
  dangerRed:       '#FF5A5F',
  successGreen:    '#51C96B',
  warningYellow:   '#FFD166',
  fitGreen:        '#49A862',
  clipBlue:        '#2F73D9',
  playheadRed:     '#E4525A',
};

// ─── Shared micro components ──────────────────────────────
const IconBtn = ({ children, active, danger, onClick, size = 30 }) => (
  <button onClick={onClick} style={{
    width: size, height: size, border: `1px solid ${active ? T.accentBlue : T.borderSubtle}`,
    borderRadius: 7, background: active ? T.accentSoft : T.surfaceControl,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    cursor: 'pointer', flexShrink: 0, color: danger ? T.dangerRed : active ? T.accentBlue : T.textSecondary,
    fontSize: 14,
  }}>{children}</button>
);

const Pill = ({ children, color, bg, border }) => (
  <span style={{
    display: 'inline-flex', alignItems: 'center', padding: '2px 10px',
    borderRadius: 100, fontSize: 11, fontWeight: 500,
    color: color || T.textSecondary,
    background: bg || T.panelHeader,
    border: `1px solid ${border || T.borderSubtle}`,
  }}>{children}</span>
);

const PanelHeader = ({ title, left, right, style }) => (
  <div style={{
    display: 'flex', alignItems: 'center', gap: 8, padding: '0 14px', height: 54,
    background: T.panelHeader, borderBottom: `1px solid ${T.borderSubtle}`,
    flexShrink: 0, ...style,
  }}>
    {left || <span style={{ fontSize: 22, fontWeight: 600, color: T.textPrimary }}>{title}</span>}
    <div style={{ flex: 1 }} />
    {right}
  </div>
);

const Divider = ({ v }) => (
  <div style={v
    ? { width: 1, background: T.borderSubtle, alignSelf: 'stretch' }
    : { height: 1, background: T.borderSubtle, flexShrink: 0 }}
  />
);

const Toggle = ({ on }) => (
  <div style={{
    width: 36, height: 20, borderRadius: 10, background: on ? T.accentBlue : T.surfaceControl,
    border: `1px solid ${on ? T.accentBlue : T.borderSubtle}`,
    position: 'relative', flexShrink: 0, cursor: 'pointer',
  }}>
    <div style={{
      position: 'absolute', top: 2, left: on ? 18 : 2, width: 14, height: 14,
      borderRadius: 7, background: 'white', transition: 'left .15s',
    }} />
  </div>
);

// ─── SVG Icons ────────────────────────────────────────────
const IcoEye = () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 3C4 3 2 6 2 7s2 4 5 4 5-3 5-4-2-4-5-4z" stroke="currentColor" strokeWidth="1.2"/><circle cx="7" cy="7" r="1.5" fill="currentColor"/></svg>;
const IcoLock = () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3.5" y="6" width="7" height="5" rx="1" stroke="currentColor" strokeWidth="1.2"/><path d="M5 6V4.5a2 2 0 014 0V6" stroke="currentColor" strokeWidth="1.2"/></svg>;
const IcoTrash = () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 4h8M5.5 4V3a.5.5 0 011 0v1M4 4l.5 7h5L10 4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>;
const IcoChevronR = () => <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2.5l3.5 3.5L4 9.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>;
const IcoChevronD = () => <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 4l3.5 3.5L9.5 4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>;
const IcoBack = () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2.5L4 7l5 4.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>;
const IcoGauge = () => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" strokeWidth="1.2"/><path d="M8 8m-3.5 0a3.5 3.5 0 0 1 7 0" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/><circle cx="8" cy="8" r=".9" fill="currentColor"/><path d="M8 8l2.2-1.8" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round"/></svg>;
const IcoPace = () => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" strokeWidth="1.2"/><path d="M8 5.5V8l1.5 1.5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>;
const IcoPlus = () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>;
const IcoFilters = () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M4 7h6M6 10h2" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>;
const IcoSearch = () => <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="3.5" stroke="currentColor" strokeWidth="1.2"/><path d="M8.5 8.5l2.5 2.5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>;
const IcoVideo = () => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3.5" width="10" height="9" rx="1.5" stroke="currentColor" strokeWidth="1.2"/><path d="M12 6.5l2.5-2v7L12 9.5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
const IcoInfo = () => <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" strokeWidth="1.1"/><path d="M6.5 5.5v4M6.5 4.5v-.5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>;

// ─── Media Pool ───────────────────────────────────────────
const mediaClips = [
  { id:1, name:'PRO_VID_20260425_083915_00_001.mp4', dur:'0m 37s', time:'Apr 25 · 8:39 AM', mark:'#FF5A5F', status:'Aligned' },
  { id:2, name:'PRO_VID_20260425_085810_00_002.mp4', dur:'1m 35s', time:'Apr 25 · 8:58 AM', mark:'#FF9342', status:'Aligned' },
  { id:3, name:'PRO_VID_20260425_090526_00_003.mp4', dur:'4m 36s', time:'Apr 25 · 9:05 AM', mark:'#FFD166', status:'Aligned' },
  { id:4, name:'PRO_VID_20260425_093449_00_004.mp4', dur:'0m 53s', time:'Apr 25 · 9:34 AM', mark:'#51C96B', status:'Aligned' },
  { id:5, name:'PRO_VID_20260425_093814_00_005.mp4', dur:'2m 39s', time:'Apr 25 · 9:38 AM', mark:null, status:'Aligned' },
  { id:6, name:'PRO_VID_20260425_094640_00_006.mp4', dur:'0m 46s', time:'Apr 25 · 9:46 AM', mark:null, status:'Aligned' },
  { id:7, name:'PRO_VID_20260425_095711_00_007.mp4', dur:'4m 33s', time:'Apr 25 · 9:57 AM', mark:'#B657E8', status:'Aligned' },
  { id:8, name:'PRO_VID_20260425_100454_00_008.mp4', dur:'1m 33s', time:'Apr 25 · 10:04 AM', mark:null, status:'Aligned' },
];

function MediaPanel({ selectedClip, onSelect }) {
  const [filter, setFilter] = useState('All');
  const [ctxMenu, setCtxMenu] = useState(null); // {id, x, y}
  const [markSub, setMarkSub] = useState(false);

  const marks = ['Red','Orange','Yellow','Green','Blue','Purple','Gray'];
  const markColors = { Red:'#FF5A5F', Orange:'#FF9342', Yellow:'#FFD166', Green:'#51C96B', Blue:'#2F8CFF', Purple:'#B657E8', Gray:'#9EA3AA' };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background: T.panelBg, borderRight:`1px solid ${T.borderSubtle}`, position:'relative' }}>
      <PanelHeader title="Media" right={
        <div style={{ display:'flex', gap:4 }}>
          <IconBtn><IcoVideo /></IconBtn>
          <IconBtn><IcoFilters /></IconBtn>
          <IconBtn><IcoChevronD /></IconBtn>
        </div>
      } />
      {/* Search */}
      <div style={{ padding:'8px 12px 0', flexShrink:0 }}>
        <div style={{ height:30, background: T.surfaceControl, border:`1px solid ${T.borderSubtle}`, borderRadius:7, display:'flex', alignItems:'center', gap:7, padding:'0 10px', color: T.textMuted }}>
          <IcoSearch /><span style={{ fontSize:13 }}>Search media</span>
        </div>
      </div>
      {/* Filter row */}
      <div style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 12px', flexShrink:0, borderBottom:`1px solid ${T.borderSubtle}` }}>
        <span style={{ fontSize:11, color: T.textMuted, flex:1 }}>8 clips</span>
        {['All','Ready','Aligned'].map(f => (
          <button key={f} onClick={() => setFilter(f)} style={{
            padding:'2px 10px', borderRadius:6, fontSize:11, fontWeight:500, cursor:'pointer',
            background: filter===f ? T.accentBlue : T.surfaceControl,
            color: filter===f ? 'white' : T.textSecondary,
            border: `1px solid ${filter===f ? T.accentBlue : T.borderSubtle}`,
          }}>{f}</button>
        ))}
      </div>
      {/* Clip list */}
      <div style={{ flex:1, overflowY:'auto' }}>
        {mediaClips.map((clip, i) => {
          const sel = selectedClip === clip.id;
          return (
            <div key={clip.id}
              onClick={() => onSelect(clip.id)}
              onContextMenu={e => { e.preventDefault(); setCtxMenu({id:clip.id, x:e.nativeEvent.offsetX, y:e.nativeEvent.offsetY}); setMarkSub(false); }}
              style={{
                display:'flex', alignItems:'center', gap:10, padding:'0 12px', height:72,
                borderBottom:`1px solid ${T.borderSubtle}`,
                background: sel ? T.surfaceSelected : i%2===0 ? '#1B2025' : '#171C21',
                borderLeft: sel ? `2px solid ${T.accentBlue}` : '2px solid transparent',
                cursor:'pointer',
              }}>
              {/* Thumb */}
              <div style={{ width:42, height:42, background:'#101418', border:`1px solid ${T.borderSubtle}`, borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, color: T.textMuted }}>
                <IcoVideo />
              </div>
              {/* Info */}
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:12, fontWeight:600, color: T.textPrimary, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{clip.name}</div>
                <div style={{ fontSize:11, color: T.textMuted, marginTop:2 }}>{clip.dur} · {clip.time}</div>
              </div>
              <div style={{ fontSize:11, color: T.textMuted, flexShrink:0 }}>Aligned</div>
              {clip.mark
                ? <div style={{ width:8, height:8, borderRadius:'50%', background:clip.mark, flexShrink:0 }} />
                : <div style={{ width:8, height:8, flexShrink:0 }} />
              }
              <div style={{ color: T.textMuted, fontSize:16, flexShrink:0 }}>···</div>
            </div>
          );
        })}
      </div>

      {/* Context menu */}
      {ctxMenu && (
        <div onClick={e => e.stopPropagation()} style={{
          position:'absolute', top: ctxMenu.y, left: ctxMenu.x, zIndex:100,
          background:'#1D2228', border:`1px solid ${T.borderSubtle}`, borderRadius:8,
          minWidth:220, boxShadow:'0 8px 32px rgba(0,0,0,.5)', padding:'4px 0',
        }}>
          {['Auto Match to Current Layer','Match to New Layer'].map(a => (
            <div key={a} onClick={() => setCtxMenu(null)} style={{ padding:'7px 14px', fontSize:13, color: T.textPrimary, cursor:'pointer' }}
              onMouseEnter={e => e.currentTarget.style.background=T.accentBlue}
              onMouseLeave={e => e.currentTarget.style.background='transparent'}
            >{a}</div>
          ))}
          <Divider />
          <div style={{ padding:'7px 14px', fontSize:13, color: T.textPrimary, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'space-between', position:'relative' }}
            onMouseEnter={e => { e.currentTarget.style.background=T.accentBlue; setMarkSub(true); }}
            onMouseLeave={e => { e.currentTarget.style.background='transparent'; }}
          >
            Mark <IcoChevronR />
            {markSub && (
              <div style={{
                position:'absolute', left:'100%', top:-4, background:'#1D2228',
                border:`1px solid ${T.borderSubtle}`, borderRadius:8, minWidth:150,
                boxShadow:'0 8px 32px rgba(0,0,0,.5)', padding:'4px 0',
              }}>
                {marks.map(m => (
                  <div key={m} onClick={() => setCtxMenu(null)} style={{ padding:'7px 14px', fontSize:13, color: T.textPrimary, cursor:'pointer', display:'flex', alignItems:'center', gap:10 }}
                    onMouseEnter={e => e.currentTarget.style.background=T.accentBlue}
                    onMouseLeave={e => e.currentTarget.style.background='transparent'}
                  >
                    <div style={{ width:10, height:10, borderRadius:'50%', background:markColors[m] }} />
                    {m}
                  </div>
                ))}
                <Divider />
                <div onClick={() => setCtxMenu(null)} style={{ padding:'7px 14px', fontSize:13, color: T.textPrimary, cursor:'pointer', display:'flex', alignItems:'center', gap:10 }}
                  onMouseEnter={e => e.currentTarget.style.background=T.accentBlue}
                  onMouseLeave={e => e.currentTarget.style.background='transparent'}
                >
                  <div style={{ width:10, height:10, borderRadius:'50%', border:`1px solid ${T.borderSubtle}` }} />
                  Clear Mark
                </div>
              </div>
            )}
          </div>
          <Divider />
          <div onClick={() => setCtxMenu(null)} style={{ padding:'7px 14px', fontSize:13, color: T.textPrimary, cursor:'pointer' }}
            onMouseEnter={e => e.currentTarget.style.background=T.accentBlue}
            onMouseLeave={e => e.currentTarget.style.background='transparent'}
          >Select All</div>
          <div onClick={() => setCtxMenu(null)} style={{ padding:'7px 14px', fontSize:13, color: T.dangerRed, cursor:'pointer' }}
            onMouseEnter={e => { e.currentTarget.style.background=T.dangerRed; e.currentTarget.style.color='white'; }}
            onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color=T.dangerRed; }}
          >Delete from Media Pool</div>
        </div>
      )}
      {ctxMenu && <div onClick={() => setCtxMenu(null)} style={{ position:'fixed', inset:0, zIndex:99 }} />}
    </div>
  );
}

// ─── Preview Canvas ───────────────────────────────────────
function PreviewPanel({ onSelectOverlay }) {
  const [guides, setGuides] = useState(true);
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background: T.appChrome, flex:1 }}>
      <PanelHeader
        left={<><span style={{ fontSize:22, fontWeight:600 }}>Preview</span><span style={{ fontSize:13, color: T.textMuted, marginLeft:8 }}>1920 × 1080 · 30 fps</span></>}
        right={<div style={{ display:'flex', gap:6 }}>
          <IconBtn active={guides} onClick={() => setGuides(g => !g)}>
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="2" y="2" width="11" height="11" rx="1" stroke="currentColor" strokeWidth="1.2"/><path d="M7.5 2v11M2 7.5h11" stroke="currentColor" strokeWidth="1" strokeDasharray="2 1.5"/></svg>
          </IconBtn>
          <div style={{ height:30, background: T.surfaceControl, border:`1px solid ${T.borderSubtle}`, borderRadius:7, display:'flex', alignItems:'center', padding:'0 10px', gap:5, cursor:'pointer' }}>
            <span style={{ fontSize:13, fontWeight:500, color: T.textSecondary }}>Fit</span>
            <IcoChevronD />
          </div>
        </div>}
      />

      {/* Canvas area */}
      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', background: T.appBg, overflow:'hidden', position:'relative' }}>
        {/* Video frame */}
        <div style={{ position:'relative', width:'85%', maxWidth:780, aspectRatio:'16/9', background:'#111', borderRadius:2, overflow:'hidden' }}>
          {/* Running photo placeholder - warm gradient bg to suggest running footage */}
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(160deg, #1a1210 0%, #2d1f14 30%, #3d2a1a 50%, #1a1510 100%)' }} />
          {/* Road perspective suggest */}
          <div style={{ position:'absolute', bottom:0, left:'25%', right:'25%', height:'60%', background:'linear-gradient(to top, rgba(40,35,28,.8), transparent)', borderRadius:'50% 50% 0 0 / 30% 30% 0 0' }} />
          <div style={{ position:'absolute', bottom:0, left:'40%', right:'40%', height:'80%', background:'linear-gradient(to top, rgba(60,55,45,.4), transparent)' }} />

          {/* Safe guides */}
          {guides && <>
            <div style={{ position:'absolute', inset:'8%', border:`1px dashed rgba(47,140,255,.35)`, pointerEvents:'none' }} />
            <div style={{ position:'absolute', top:'50%', left:0, right:0, height:1, background:'rgba(47,140,255,.15)', pointerEvents:'none' }} />
            <div style={{ position:'absolute', left:'50%', top:0, bottom:0, width:1, background:'rgba(47,140,255,.15)', pointerEvents:'none' }} />
          </>}

          {/* Overlay: Running Gauge (bottom-left) */}
          <div onClick={() => onSelectOverlay('gauge')} style={{
            position:'absolute', bottom:'8%', left:'6%', cursor:'pointer',
            background:'rgba(0,0,0,.55)', borderRadius:12, padding:'10px 14px',
          }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              {/* gauge arc */}
              <svg width="52" height="52" viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="20" fill="none" stroke="rgba(255,255,255,.15)" strokeWidth="3.5"/>
                <circle cx="26" cy="26" r="20" fill="none" stroke="#51C96B" strokeWidth="3.5"
                  strokeDasharray="75 125" strokeDashoffset="31" strokeLinecap="round"/>
                <text x="26" y="22" textAnchor="middle" fill="white" fontSize="10" fontWeight="600" fontFamily="-apple-system">10.73</text>
                <text x="26" y="32" textAnchor="middle" fill="#B6BEC7" fontSize="7" fontFamily="-apple-system">km</text>
              </svg>
              <div>
                <div style={{ fontSize:10, color:'#B6BEC7' }}>Distance</div>
                <div style={{ fontSize:10, color:T.accentBlue }}>of <b style={{ color:'white' }}>21.10</b> km</div>
              </div>
            </div>
          </div>

          {/* Overlay: Pace (bottom-right) */}
          <div onClick={() => onSelectOverlay('pace')} style={{
            position:'absolute', bottom:'8%', right:'6%', cursor:'pointer', textAlign:'right',
          }}>
            <div style={{ fontSize:28, fontWeight:700, color:'white', fontFamily:'monospace', textShadow:'0 2px 8px rgba(0,0,0,.8)' }}>5'10"<span style={{ fontSize:16 }}>/km</span></div>
            <div style={{ fontSize:11, color:'#B6BEC7', textShadow:'0 1px 4px rgba(0,0,0,.8)' }}>Avg Pace</div>
          </div>

          {/* Route map overlay (selected, top-right) */}
          <div onClick={() => onSelectOverlay('route')} style={{
            position:'absolute', top:'8%', right:'5%', width:'28%', aspectRatio:'1.1',
            background:'rgba(20,24,28,.8)', border:`2px solid ${T.accentBlue}`, borderRadius:4, cursor:'pointer',
          }}>
            {/* Handle dots */}
            {[[0,0],[50,0],[100,0],[0,50],[100,50],[0,100],[50,100],[100,100]].map(([x,y],i) => (
              <div key={i} style={{
                position:'absolute', width:8, height:8, borderRadius:'50%', background:T.accentBlue,
                left:`${x}%`, top:`${y}%`, transform:'translate(-50%,-50%)',
              }} />
            ))}
            <svg style={{ width:'100%', height:'100%' }} viewBox="0 0 100 100" fill="none">
              <path d="M20 80 Q35 60 45 40 Q55 25 70 20 Q80 30 75 50 Q65 70 50 75 Q35 80 20 80z" stroke="white" strokeWidth="2" fill="none" strokeLinecap="round"/>
              <circle cx="20" cy="80" r="3" fill="#51C96B"/>
              <circle cx="70" cy="20" r="3" fill={T.dangerRed}/>
            </svg>
            <div style={{ position:'absolute', bottom:6, right:8, fontSize:12, fontWeight:600, color:'white', fontFamily:'monospace' }}>13.47 km</div>
          </div>
        </div>
      </div>

      {/* Playback bar */}
      <div style={{ height:52, background: T.appChrome, borderTop:`1px solid ${T.borderSubtle}`, display:'flex', alignItems:'center', position:'relative', flexShrink:0 }}>
        <div style={{ position:'absolute', left:'50%', transform:'translateX(-50%)', display:'flex', gap:4, alignItems:'center' }}>
          {[
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 3v10M12 8L6 4v8l6-4z" fill="currentColor"/></svg>,
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="4" y="4" width="8" height="8" fill="currentColor"/></svg>,
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M5 4l6 4-6 4z" fill="currentColor"/></svg>,
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 3v10M4 8l6-4v8L4 8z" fill="currentColor"/></svg>,
          ].map((icon, i) => (
            <button key={i} style={{
              width:36, height:36, border:`1px solid ${T.borderSubtle}`, borderRadius:7,

  const [open, setOpen] = React.useState({ preset:true, dataLayout:true, region:true, dial:true, ring:true, ticks:false, dividers:false, typo:false, color:false, effects:false });

            <Row key={lbl} label={lbl}><Drop label={val}/></Row>

  const [selectedOverlay, setSelectedOverlay] = useState(null);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', background: T.appBg, overflow:'hidden' }}>
      <AppToolbar />

      {/* Main content area */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', minHeight:0 }}>
        {/* Upper panels */}
        <div style={{ flex:1, display:'flex', minHeight:0 }}>
          {/* Media Pool */}
          <div style={{ width:310, flexShrink:0 }}>
            <MediaPanel selectedClip={selectedClip} onSelect={setSelectedClip} />
          </div>

          {/* Preview (center) */}
          <PreviewPanel onSelectOverlay={setSelectedOverlay} />

          {/* Inspector */}
          <div style={{ width:368, flexShrink:0, borderLeft:`1px solid ${T.borderSubtle}` }}>
            <InspectorPanel selectedOverlay={selectedOverlay} onSelectOverlay={setSelectedOverlay} />
          </div>
        </div>

        {/* Timeline */}
        <div style={{ height:190, flexShrink:0 }}>
          <TimelinePanel />
        </div>
      </div>

      <StatusBar />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
