<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #0B0F12; padding: 0; display: flex; flex-direction: column; gap: 1px; }
  .panel-header {
    display: flex; align-items: center; gap: 8px;
    padding: 0 14px; height: 54px;
    background: #1B2025;
    border-bottom: 1px solid #2B3238;
  }
  .title { font-size: 22px; font-weight: 600; color: #F3F6F8; flex: 1; }
  .pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 500; background: #1B2025; color: #B6BEC7; border: 1px solid #2B3238; }
  .icon-btn { width: 30px; height: 30px; background: #20252A; border: 1px solid #2B3238; border-radius: 7px; display:flex;align-items:center;justify-content:center;cursor:pointer; }
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 0 14px; height: 54px;
    background: #101418;
    border-bottom: 1px solid #2B3238;
  }
  .btn-secondary { display:inline-flex;align-items:center;gap:6px;background:#20252A;color:#B6BEC7;border:1px solid #2B3238;font-family:var(--font-sans);font-size:13px;font-weight:600;padding:0 12px;height:32px;border-radius:7px;cursor:pointer; }
  .btn-primary { display:inline-flex;align-items:center;gap:6px;background:#2F8CFF;color:white;border:none;font-family:var(--font-sans);font-size:13px;font-weight:600;padding:0 12px;height:32px;border-radius:7px;cursor:pointer; }
  .spacer { flex: 1; }
</style>
</head>
<body>
<!-- App toolbar -->
<div class="toolbar">
  <button class="btn-secondary">FIT</button>
  <button class="btn-secondary">Videos</button>
  <div class="spacer"></div>
  <button class="btn-primary">Export</button>
</div>
<!-- Inspector panel header -->
<div class="panel-header">
  <div class="title">Inspector</div>
  <span class="pill">2 overlays</span>
  <div class="icon-btn">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 4.5h11M4 7.5h7M6 10.5h3" stroke="#B6BEC7" stroke-width="1.3" stroke-linecap="round"/></svg>
  </div>
</div>
<!-- Media panel header -->
<div class="panel-header">
  <div class="title">Media</div>
  <div class="spacer"></div>
  <div class="icon-btn">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="5" cy="5" r="1.5" fill="#B6BEC7"/><circle cx="10" cy="5" r="1.5" fill="#B6BEC7"/><circle cx="5" cy="10" r="1.5" fill="#B6BEC7"/><circle cx="10" cy="10" r="1.5" fill="#B6BEC7"/></svg>
  </div>
  <div class="icon-btn">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 4h11M2 7.5h11M2 11h11" stroke="#B6BEC7" stroke-width="1.3" stroke-linecap="round"/></svg>
  </div>
  <div class="icon-btn">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M5 3l5 4.5L5 12" stroke="#B6BEC7" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
</div>
<!-- Preview panel header -->
<div class="panel-header">
  <span style="font-size:22px;font-weight:600;color:#F3F6F8;">Preview</span>
  <span style="font-size:13px;color:#7E8893;margin-left:6px;">1920 × 1080 · 30 fps</span>
  <div class="spacer"></div>
  <div class="icon-btn" style="background:#123052;border-color:#2F8CFF;">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="2" y="2" width="11" height="11" rx="1" stroke="#2F8CFF" stroke-width="1.2"/><rect x="4" y="4" width="7" height="7" rx=".5" stroke="#2F8CFF" stroke-width="1" stroke-dasharray="2 1.5"/></svg>
  </div>
  <div class="icon-btn" style="gap:4px;width:auto;padding:0 10px;">
    <span style="font-size:13px;font-weight:500;color:#B6BEC7;">Fit</span>
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="#B6BEC7" stroke-width="1.3" stroke-linecap="round"/></svg>
  </div>
</div>
</body>
</html>
