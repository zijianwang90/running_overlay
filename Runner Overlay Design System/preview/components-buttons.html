<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #15191D; padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .label { font-family: var(--font-sans); font-size: 10px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .06em; width: 120px; flex-shrink:0; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 6px;
    background: #2F8CFF; color: white; border: none;
    font-family: var(--font-sans); font-size: 13px; font-weight: 600;
    padding: 0 12px; height: 32px; border-radius: 7px; cursor: pointer;
  }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 6px;
    background: #20252A; color: #B6BEC7; border: 1px solid #2B3238;
    font-family: var(--font-sans); font-size: 13px; font-weight: 600;
    padding: 0 12px; height: 32px; border-radius: 7px; cursor: pointer;
  }
  .btn-danger {
    display: inline-flex; align-items: center; gap: 6px;
    background: #20252A; color: #FF5A5F; border: 1px solid #2B3238;
    font-family: var(--font-sans); font-size: 13px; font-weight: 600;
    padding: 0 12px; height: 32px; border-radius: 7px; cursor: pointer;
  }
  .btn-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px;
    background: #20252A; border: 1px solid #2B3238; border-radius: 7px; cursor: pointer;
  }
  .btn-icon-active {
    background: #123052; border-color: #2F8CFF;
  }
  .btn-icon svg { display: block; }
  /* Native macOS-style segmented control */
  .seg {
    display: inline-flex; align-items: center;
    background: rgba(255,255,255,0.06);
    border-radius: 6px; padding: 2px; gap: 1px;
  }
  .seg-item {
    padding: 0 12px; height: 24px; display: flex; align-items: center;
    font-family: var(--font-sans); font-size: 12px; font-weight: 500; color: #B6BEC7;
    border-radius: 5px; cursor: pointer; user-select: none;
    background: transparent; transition: background 0.1s;
  }
  .seg-item.active {
    background: #3A4149;
    color: #F3F6F8;
    box-shadow: 0 1px 3px rgba(0,0,0,.4), 0 0 0 0.5px rgba(255,255,255,0.08);
  }
  .pill {
    display: inline-flex; align-items: center; padding: 2px 10px;
    border-radius: 100px; font-size: 11px; font-family: var(--font-sans); font-weight: 500;
  }
</style>
</head>
<body>
<div class="row">
  <div class="label">Primary</div>
  <button class="btn-primary">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>
    Export
  </button>
</div>
<div class="row">
  <div class="label">Secondary</div>
  <button class="btn-secondary">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M2 7h10M2 10h10" stroke="#B6BEC7" stroke-width="1.4" stroke-linecap="round"/></svg>
    FIT
  </button>
  <button class="btn-secondary">Videos</button>
  <button class="btn-secondary">Reset</button>
</div>
<div class="row">
  <div class="label">Danger</div>
  <button class="btn-danger">Delete</button>
</div>
<div class="row">
  <div class="label">Icon Buttons</div>
  <div class="btn-icon">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="5" stroke="#B6BEC7" stroke-width="1.3"/><path d="M7.5 5v2.5l1.5 1.5" stroke="#B6BEC7" stroke-width="1.3" stroke-linecap="round"/></svg>
  </div>
  <div class="btn-icon">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2.5C4.74 2.5 2.5 4.74 2.5 7.5S4.74 12.5 7.5 12.5 12.5 10.26 12.5 7.5 10.26 2.5 7.5 2.5z" stroke="#B6BEC7" stroke-width="1.3"/><path d="M7.5 5.5v4M5.5 7.5h4" stroke="#B6BEC7" stroke-width="1.3" stroke-linecap="round"/></svg>
  </div>
  <div class="btn-icon btn-icon-active">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="3" width="12" height="3" rx="1" stroke="#2F8CFF" stroke-width="1.2"/><rect x="1.5" y="9" width="12" height="3" rx="1" stroke="#2F8CFF" stroke-width="1.2"/></svg>
  </div>
  <div class="btn-icon">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M3 5h9M3 7.5h9M3 10h9" stroke="#B6BEC7" stroke-width="1.3" stroke-linecap="round"/></svg>
  </div>
  <span style="font-family:var(--font-sans);font-size:10px;color:#555;">normal / normal / active / normal</span>
</div>
<div class="row">
  <div class="label">Segmented</div>
  <div class="seg">
    <div class="seg-item active">Metrics</div>
    <div class="seg-item">Charts</div>
    <div class="seg-item">Route</div>
  </div>
</div>
<div class="row">
  <div class="label">Pills</div>
  <span class="pill" style="background:#1B2025;color:#B6BEC7;border:1px solid #2B3238;">2 overlays</span>
  <span class="pill" style="background:#1a2f1e;color:#51C96B;border:1px solid #51C96B44;">Ready</span>
  <span class="pill" style="background:#123052;color:#2F8CFF;border:1px solid #2F8CFF44;">Aligned</span>
  <span class="pill" style="background:#Numeric Overlay;color:#F3F6F8;border:1px solid #2B3238;background:#1B2025;">Numeric Overlay</span>
</div>
</body>
</html>
