<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #1a1a1a; padding: 16px; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .chip { width: 80px; height: 48px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); }
  .label { font-family: var(--font-mono); font-size: 10px; color: #888; }
  .name  { font-family: var(--font-sans); font-size: 10px; color: #aaa; }
  .group-label { font-family: var(--font-sans); font-size: 10px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; margin-top: 8px; }
</style>
</head>
<body>
<div class="group-label">App Backgrounds</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#0B0F12;"></div><div class="name">app.bg</div><div class="label">#0B0F12</div></div>
  <div class="swatch"><div class="chip" style="background:#101418;"></div><div class="name">app.chrome</div><div class="label">#101418</div></div>
</div>
<div class="group-label">Panel Surfaces</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#15191D;"></div><div class="name">panel.bg</div><div class="label">#15191D</div></div>
  <div class="swatch"><div class="chip" style="background:#1B2025;"></div><div class="name">panel.header</div><div class="label">#1B2025</div></div>
  <div class="swatch"><div class="chip" style="background:#20252A;"></div><div class="name">surface.control</div><div class="label">#20252A</div></div>
  <div class="swatch"><div class="chip" style="background:#272D33;"></div><div class="name">surface.hover</div><div class="label">#272D33</div></div>
  <div class="swatch"><div class="chip" style="background:#11161A;"></div><div class="name">surface.pressed</div><div class="label">#11161A</div></div>
  <div class="swatch"><div class="chip" style="background:#263244;"></div><div class="name">surface.selected</div><div class="label">#263244</div></div>
</div>
<div class="group-label">Borders</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#2B3238;"></div><div class="name">border.subtle</div><div class="label">#2B3238</div></div>
  <div class="swatch"><div class="chip" style="background:#3A424A;"></div><div class="name">border.strong</div><div class="label">#3A424A</div></div>
</div>
</body>
</html>
