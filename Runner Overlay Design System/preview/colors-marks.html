<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: #1a1a1a; padding: 16px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .dot { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.12); }
  .label { font-family: var(--font-mono); font-size: 10px; color: #888; }
  .name  { font-family: var(--font-sans); font-size: 10px; color: #aaa; }
  .group-label { font-family: var(--font-sans); font-size: 10px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .demo-row { display: flex; align-items: center; gap: 10px; background: #15191D; border-radius: 6px; padding: 8px 12px; margin-top: 12px; border: 1px solid #2B3238; }
  .file-icon { width: 32px; height: 32px; background: #101418; border-radius: 4px; border: 1px solid #2B3238; display:flex;align-items:center;justify-content:center; }
  .filename { font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: #F3F6F8; }
  .meta { font-family: var(--font-sans); font-size: 11px; color: #7E8893; }
</style>
</head>
<body>
<div class="group-label">Media Pool Mark Colors</div>
<div class="row">
  <div class="swatch"><div class="dot" style="background:#FF5A5F;"></div><div class="name">Red</div></div>
  <div class="swatch"><div class="dot" style="background:#FF9342;"></div><div class="name">Orange</div></div>
  <div class="swatch"><div class="dot" style="background:#FFD166;"></div><div class="name">Yellow</div></div>
  <div class="swatch"><div class="dot" style="background:#51C96B;"></div><div class="name">Green</div></div>
  <div class="swatch"><div class="dot" style="background:#2F8CFF;"></div><div class="name">Blue</div></div>
  <div class="swatch"><div class="dot" style="background:#B657E8;"></div><div class="name">Purple</div></div>
  <div class="swatch"><div class="dot" style="background:#9EA3AA;"></div><div class="name">Gray</div></div>
</div>
<div class="demo-row">
  <div class="file-icon">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="#3A424A" stroke-width="1.2"/><polygon points="6,5 12,8 6,11" fill="#7E8893"/></svg>
  </div>
  <div style="flex:1;">
    <div class="filename">PRO_VID_20260425_083915_00_001.mp4</div>
    <div class="meta">0m 37s &nbsp;•&nbsp; Apr 25, 2026 at 8:39:15 AM</div>
  </div>
  <span style="font-family:var(--font-sans);font-size:11px;color:#7E8893;">Aligned by timestamp</span>
  <div class="dot" style="background:#FF5A5F; width:10px; height:10px;"></div>
</div>
</body>
</html>
