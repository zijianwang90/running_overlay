name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain
        run: |
          swift --version
          xcodebuild -version
      - name: Build and test
        run: ./scripts/check.sh
      - name: Build release product
        run: swift build -c release --product RunningOverlay
      - name: Visual regression
        run: ./scripts/visual-test.sh
      - name: Publication audit
        run: ./scripts/publication-audit.sh
