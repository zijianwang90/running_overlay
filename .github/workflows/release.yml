name: Release Candidate

on:
  push:
    tags:
      - "v*-rc.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  draft-prerelease:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Toolchain
        run: |
          swift --version
          xcodebuild -version
          gh --version

      - name: Validate release-candidate tag and version
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          case "$tag" in
            v*-rc.*) ;;
            *)
              echo "Release-candidate workflow only accepts tags like v0.1.0-rc.1." >&2
              exit 1
              ;;
          esac

          version="${tag#v}"
          marketing_version="${version%%-rc.*}"

          if ! [[ "$marketing_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid marketing version parsed from tag: $marketing_version" >&2
            exit 1
          fi

          configured_version="$(
            awk -F= '/^[[:space:]]*MARKETING_VERSION[[:space:]]*=/ {
              gsub(/[[:space:]]/, "", $2)
              print $2
              exit
            }' Config/AppStore.xcconfig
          )"

          if [[ "$configured_version" != "$marketing_version" ]]; then
            echo "Tag $tag expects MARKETING_VERSION=$marketing_version, got $configured_version." >&2
            exit 1
          fi

          {
            echo "tag=$tag"
            echo "marketing_version=$marketing_version"
          } >> "$GITHUB_OUTPUT"
        id: version

      - name: Build, test, and audit
        run: |
          ./scripts/check.sh
          ./scripts/visual-test.sh
          ./scripts/publication-audit.sh
          scripts/validate-appstore-config.sh

      - name: Build release product
        run: swift build -c release --product RunningOverlay

      - name: Prepare release notes
        run: |
          set -euo pipefail
          mkdir -p build/release
          {
            printf 'Running Overlay %s is a release-candidate source snapshot for version %s.\n\n' "${{ steps.version.outputs.tag }}" "${{ steps.version.outputs.marketing_version }}"
            printf 'This draft pre-release is created from tag `%s` after build, test, visual-regression, publication-audit, and App Store configuration checks pass.\n\n' "${{ steps.version.outputs.tag }}"
            printf 'Distribution-signed App Store builds are produced through the Xcode archive and App Store Connect flow from the same release commit. This GitHub pre-release intentionally does not attach an unsigned or non-notarized app bundle.\n'
          } > build/release/notes.md

      - name: Create draft pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --verify-tag \
            --draft \
            --prerelease \
            --title "Running Overlay ${{ steps.version.outputs.tag }}" \
            --notes-file build/release/notes.md
