name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  github-release:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Toolchain
        run: |
          swift --version
          xcodebuild -version
          gh --version
          xcrun notarytool --version

      - name: Validate release tag and version
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          case "$tag" in
            v*-rc.*)
              release_kind="rc"
              marketing_version="${tag#v}"
              marketing_version="${marketing_version%%-rc.*}"
              ;;
            v[0-9]*.[0-9]*.[0-9]*)
              release_kind="final"
              marketing_version="${tag#v}"
              ;;
            *)
              echo "Release workflow only accepts tags like v0.1.0 or v0.1.0-rc.1." >&2
              exit 1
              ;;
          esac

          if ! [[ "$marketing_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid marketing version parsed from tag: $marketing_version" >&2
            exit 1
          fi

          configured_version="$(
            awk -F= '/^[[:space:]]*MARKETING_VERSION[[:space:]]*=/ {
              gsub(/[[:space:]]/, "", $2)
              print $2
              exit
            }' Config/AppStore.xcconfig
          )"

          if [[ "$configured_version" != "$marketing_version" ]]; then
            echo "Tag $tag expects MARKETING_VERSION=$marketing_version, got $configured_version." >&2
            exit 1
          fi

          {
            echo "tag=$tag"
            echo "release_kind=$release_kind"
            echo "marketing_version=$marketing_version"
          } >> "$GITHUB_OUTPUT"
        id: version

      - name: Build, test, and audit
        run: |
          ./scripts/check.sh
          ./scripts/visual-test.sh
          ./scripts/publication-audit.sh
          scripts/validate-appstore-config.sh

      - name: Build release product
        run: swift build -c release --product RunningOverlay

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_APPLICATION_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_P12 }}
          DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${DEVELOPER_ID_APPLICATION_CERTIFICATE_P12}" ]]; then
            echo "Missing DEVELOPER_ID_APPLICATION_CERTIFICATE_P12 secret." >&2
            exit 1
          fi
          if [[ -z "${DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD}" ]]; then
            echo "Missing DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD secret." >&2
            exit 1
          fi

          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/release-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "$DEVELOPER_ID_APPLICATION_CERTIFICATE_P12" | base64 -D > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/[ "]//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Build signed app bundle
        env:
          RUNNING_OVERLAY_SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION_SIGNING_IDENTITY }}
          RUNNING_OVERLAY_MARKETING_VERSION: ${{ steps.version.outputs.marketing_version }}
          RUNNING_OVERLAY_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          if [[ -z "${RUNNING_OVERLAY_SIGN_IDENTITY}" ]]; then
            echo "Missing DEVELOPER_ID_APPLICATION_SIGNING_IDENTITY secret." >&2
            exit 1
          fi

          app_path="$(scripts/build-appstore-app.sh)"
          echo "app_path=$app_path" >> "$GITHUB_ENV"
          codesign --display --verbose=2 "$app_path"

      - name: Notarize and staple app
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -euo pipefail

          for secret_name in ASC_KEY_ID ASC_ISSUER_ID ASC_API_KEY_P8; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing ${secret_name} secret." >&2
              exit 1
            fi
          done

          api_key_path="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s' "$ASC_API_KEY_P8" > "$api_key_path"

          notarization_zip="$RUNNER_TEMP/RunningOverlay-notarization.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$notarization_zip"

          xcrun notarytool submit "$notarization_zip" \
            --key "$api_key_path" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait

          xcrun stapler staple "$app_path"
          xcrun stapler validate "$app_path"
          spctl -a -vv "$app_path"

      - name: Package release assets
        run: |
          set -euo pipefail

          asset_dir="build/release"
          tag="${{ steps.version.outputs.tag }}"
          zip_name="RunningOverlay-${tag}-macOS-arm64.zip"
          sha_name="${zip_name}.sha256"

          rm -rf "$asset_dir"
          mkdir -p "$asset_dir"

          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$asset_dir/$zip_name"
          (
            cd "$asset_dir"
            shasum -a 256 "$zip_name" > "$sha_name"
          )

          {
            echo "asset_dir=$asset_dir"
            echo "zip_name=$zip_name"
            echo "sha_name=$sha_name"
          } >> "$GITHUB_ENV"

          ls -lh "$asset_dir"
          cat "$asset_dir/$sha_name"

      - name: Prepare release notes
        run: |
          set -euo pipefail
          mkdir -p build/release
          if [[ "${{ steps.version.outputs.release_kind }}" == "rc" ]]; then
            release_label="release-candidate snapshot"
            release_scope="draft pre-release"
          else
            release_label="stable release"
            release_scope="public release"
          fi
          {
            printf 'Running Overlay %s is a %s for version %s.\n\n' "${{ steps.version.outputs.tag }}" "$release_label" "${{ steps.version.outputs.marketing_version }}"
            printf 'This %s is created from tag `%s` after build, test, visual-regression, publication-audit, App Store configuration, Developer ID signing, notarization, stapling, Gatekeeper, and optimized release-product checks pass.\n\n' "$release_scope" "${{ steps.version.outputs.tag }}"
            printf '## Assets\n\n'
            printf -- '- `%s`: notarized macOS arm64 app bundle built from `%s`.\n' "$zip_name" "${{ steps.version.outputs.tag }}"
            printf -- '- `%s`: SHA-256 checksum for the zip.\n\n' "$sha_name"
            printf 'The downloadable app is signed with Developer ID Application, notarized by Apple, stapled, and verified with `spctl`.\n'
          } > build/release/notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            if [[ "${{ steps.version.outputs.release_kind }}" == "rc" ]]; then
              gh release edit "${{ steps.version.outputs.tag }}" \
                --draft \
                --prerelease \
                --title "Running Overlay ${{ steps.version.outputs.tag }}" \
                --notes-file build/release/notes.md
            else
              gh release edit "${{ steps.version.outputs.tag }}" \
                --draft=false \
                --prerelease=false \
                --latest \
                --title "Running Overlay ${{ steps.version.outputs.tag }}" \
                --notes-file build/release/notes.md
            fi
          else
            if [[ "${{ steps.version.outputs.release_kind }}" == "rc" ]]; then
              gh release create "${{ steps.version.outputs.tag }}" \
                --verify-tag \
                --draft \
                --prerelease \
                --title "Running Overlay ${{ steps.version.outputs.tag }}" \
                --notes-file build/release/notes.md
            else
              gh release create "${{ steps.version.outputs.tag }}" \
                --verify-tag \
                --latest \
                --title "Running Overlay ${{ steps.version.outputs.tag }}" \
                --notes-file build/release/notes.md
            fi
          fi

          gh release upload "${{ steps.version.outputs.tag }}" \
            "$asset_dir/$zip_name" \
            "$asset_dir/$sha_name" \
            --clobber
