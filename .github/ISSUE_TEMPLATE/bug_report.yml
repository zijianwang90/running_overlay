name: Bug report
description: Report a reproducible defect using public or synthetic data.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Do not upload private FIT files, GPS traces, videos, API keys, or signing data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. …\n2. …\n3. …"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: macOS and hardware
      placeholder: macOS 15.x, Apple Silicon
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Minimal public fixture or logs
      description: Link a synthetic fixture or paste sanitized logs.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed credentials, personal paths, GPS traces, and private media.
          required: true
